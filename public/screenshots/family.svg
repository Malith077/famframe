<svg width="300" height="620" viewBox="0 0 300 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FamFrame family members screen">
  <rect width="300" height="620" fill="#fbf9f8"/>
  <!-- status bar -->
  <text x="24" y="30" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1b1c1c">9:41</text>
  <rect x="248" y="21" width="18" height="10" rx="2" fill="#424842"/>
  <rect x="270" y="22" width="14" height="8" rx="2" fill="#424842"/>
  <!-- header -->
  <text x="20" y="76" font-family="Plus Jakarta Sans, sans-serif" font-size="22" font-weight="700" fill="#1b1c1c">Family</text>
  <text x="20" y="98" font-family="Inter, sans-serif" font-size="12" fill="#737972">5 people can see this album</text>

  <!-- member rows -->
  <g font-family="Inter, sans-serif">
    <rect x="16" y="120" width="268" height="66" rx="18" fill="#ffffff" stroke="#efeded"/>
    <circle cx="52" cy="153" r="20" fill="#cceace"/>
    <text x="52" y="158" font-size="15" font-weight="700" fill="#4a654e" text-anchor="middle">M</text>
    <text x="84" y="149" font-size="14" font-weight="600" fill="#1b1c1c">Mum (You)</text>
    <text x="84" y="167" font-size="12" fill="#737972">Owner</text>

    <rect x="16" y="196" width="268" height="66" rx="18" fill="#ffffff" stroke="#efeded"/>
    <circle cx="52" cy="229" r="20" fill="#c5e4f5"/>
    <text x="52" y="234" font-size="15" font-weight="700" fill="#456270" text-anchor="middle">G</text>
    <text x="84" y="225" font-size="14" font-weight="600" fill="#1b1c1c">Grandma Rose</text>
    <text x="84" y="243" font-size="12" fill="#737972">Family</text>

    <rect x="16" y="272" width="268" height="66" rx="18" fill="#ffffff" stroke="#efeded"/>
    <circle cx="52" cy="305" r="20" fill="#a4a09b"/>
    <text x="52" y="310" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">P</text>
    <text x="84" y="301" font-size="14" font-weight="600" fill="#1b1c1c">Grandpa Joe</text>
    <text x="84" y="319" font-size="12" fill="#737972">Family</text>

    <rect x="16" y="348" width="268" height="66" rx="18" fill="#ffffff" stroke="#efeded"/>
    <circle cx="52" cy="381" r="20" fill="#8ba88e"/>
    <text x="52" y="386" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">A</text>
    <text x="84" y="377" font-size="14" font-weight="600" fill="#1b1c1c">Aunt Sofia</text>
    <text x="84" y="395" font-size="12" fill="#737972">Family</text>
  </g>

  <!-- invite button -->
  <rect x="20" y="450" width="260" height="52" rx="26" fill="#4a654e"/>
  <path d="M118 476h16M126 468v16" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <text x="146" y="481" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#ffffff">Invite family</text>

  <!-- invite link chip -->
  <rect x="20" y="516" width="260" height="44" rx="22" fill="#f5f3f3"/>
  <path d="M46 538a5 5 0 0 1 0-7l4-4a5 5 0 0 1 7 7l-1 1" stroke="#737972" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="66" y="542" font-family="Inter, sans-serif" font-size="12" fill="#737972">famframe.app/invite/ava-rose</text>

  <!-- bottom tab bar -->
  <rect x="0" y="566" width="300" height="54" fill="#ffffff"/>
  <rect x="0" y="566" width="300" height="1" fill="#e4e2e2"/>
  <circle cx="60" cy="592" r="4.5" fill="#c2c8c0"/>
  <circle cx="130" cy="592" r="4.5" fill="#c2c8c0"/>
  <circle cx="200" cy="592" r="4.5" fill="#4a654e"/>
  <circle cx="262" cy="592" r="4.5" fill="#c2c8c0"/>
</svg>
